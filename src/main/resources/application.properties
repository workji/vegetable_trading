# =================================================================================
# \u9752\u679C\u4EF2\u5378\u7BA1\u7406\u7CFB\u7EDF - \u6838\u5FC3\u73AF\u5883\u914D\u7F6E\u6587\u4EF6 (application.properties)
# \u4F5C\u7528\uFF1A\u7EDF\u7BA1\u670D\u52A1\u5668\u7AEF\u53E3\u3001\u6570\u636E\u5E93\u8FDE\u63A5\u3001\u6301\u4E45\u5C42\u6846\u67B6\u884C\u4E3A\u3001\u89C6\u56FE\u6A21\u677F\u5F15\u64CE\u53CA\u65E5\u5FD7\u8F93\u51FA\u7EA7\u522B\u3002
# =================================================================================

# -----------------------------------------
# 1. Spring Boot / \u670D\u52A1\u5668\u57FA\u7840\u8BBE\u7F6E
# -----------------------------------------
server.port=8080
spring.application.name=vegetable-trading

# -----------------------------------------
# 2. \u6570\u636E\u5E93\u8FDE\u63A5\u8BBE\u7F6E (\u57FA\u4E8E MySQL 8.x)
# -----------------------------------------
# \u3010\u67B6\u6784\u5E08\u9632\u5751\u6307\u5357\u3011\uFF1A
# serverTimezone=Asia/Shanghai \u662F\u5FC5\u987B\u7684\uFF0C\u5426\u5219\u4F1A\u5BFC\u81F4\u5165\u5E93\u65F6\u95F4\u4E0E\u7CFB\u7EDF\u65F6\u95F4\u76F8\u5DEE 8 \u5C0F\u65F6\u3002
# allowPublicKeyRetrieval=true \u7528\u4E8E\u89E3\u51B3\u9AD8\u7248\u672C MySQL \u5728\u975E SSL \u8FDE\u63A5\u4E0B\u7684\u516C\u94A5\u68C0\u7D22\u62A5\u9519\u3002
spring.datasource.url=jdbc:mysql://localhost:3306/vegetable_trading?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- HikariCP (\u9AD8\u6027\u80FD\u6570\u636E\u5E93\u8FDE\u63A5\u6C60) \u4F01\u4E1A\u7EA7\u8C03\u4F18 ---
# \u8FDE\u63A5\u8D85\u65F6\u65F6\u95F4\uFF08\u6BEB\u79D2\uFF09\uFF0C\u8D85\u8FC7 20 \u79D2\u8FDE\u4E0D\u4E0A\u6570\u636E\u5E93\u5219\u76F4\u63A5\u62A5\u9519\uFF0C\u9632\u6B62\u7EBF\u7A0B\u65E0\u9650\u6302\u8D77
spring.datasource.hikari.connection-timeout=20000
# \u8FDE\u63A5\u6C60\u7684\u6700\u5927\u8FDE\u63A5\u6570\u3002\u5355\u4EBA\u6216\u540E\u53F0\u5C0F\u56E2\u961F\u7CFB\u7EDF\uFF0C\u914D\u7F6E 10~20 \u5373\u53EF\u3002\u5207\u5FCC\u914D\u6210 1000\uFF0C\u53CD\u800C\u4F1A\u62D6\u6162 CPU\u3002
spring.datasource.hikari.maximum-pool-size=10
# \u8FDE\u63A5\u5728\u6C60\u4E2D\u7684\u6700\u5927\u5B58\u6D3B\u65F6\u95F4\uFF08\u6BEB\u79D2\uFF09\uFF0C\u8FD9\u91CC\u8BBE\u4E3A 30 \u5206\u949F\uFF0C\u9632\u6B62 MySQL \u670D\u52A1\u7AEF\u4E3B\u52A8\u65AD\u5F00\u95F2\u7F6E\u8FDE\u63A5\u5F15\u53D1\u7684\u5047\u6B7B
spring.datasource.hikari.max-lifetime=1800000

# -----------------------------------------
# 3. MyBatis \u6846\u67B6\u884C\u4E3A\u8BBE\u7F6E
# -----------------------------------------
# \u3010\u6838\u5FC3\u5F00\u5173\u3011\uFF1A\u5F00\u542F\u9A7C\u5CF0\u547D\u540D\u81EA\u52A8\u6620\u5C04\u3002
# \u5F00\u542F\u540E\uFF0C\u6570\u636E\u5E93\u7684\u4E0B\u5212\u7EBF\u5B57\u6BB5 (\u5982 target_date) \u624D\u80FD\u81EA\u52A8\u88C5\u914D\u5230 Java \u5BF9\u8C61\u7684\u9A7C\u5CF0\u5C5E\u6027 (\u5982 targetDate) \u4E2D\u3002
# \u82E5\u6F0F\u5199\u6B64\u884C\uFF0C\u6240\u6709\u5E26\u6709\u4E0B\u5212\u7EBF\u7684\u5B57\u6BB5\u67E5\u8BE2\u7ED3\u679C\u5168\u4E3A null\uFF0C\u5C06\u5F15\u53D1\u81F4\u547D\u7684\u7A7A\u6307\u9488\u5F02\u5E38 (NPE)\u3002
mybatis.configuration.map-underscore-to-camel-case=true

# \u5F00\u53D1\u671F\u5229\u5668\uFF1A\u5728\u63A7\u5236\u53F0\u6253\u5370\u5E95\u5C42\u771F\u5B9E\u6267\u884C\u7684 SQL \u8BED\u53E5\u53CA\u5176\u53C2\u6570\u3002\u751F\u4EA7\u73AF\u5883 (Production) \u8BF7\u52A1\u5FC5\u6CE8\u91CA\u6389\u672C\u884C\u3002
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# -----------------------------------------
# 4. FreeMarker (UI \u89C6\u56FE\u6A21\u677F\u5F15\u64CE) \u8BBE\u7F6E
# -----------------------------------------
# \u5F00\u53D1\u671F\u95F4\u5173\u95ED\u6A21\u677F\u7F13\u5B58\u3002\u8FD9\u6837\u53EA\u8981\u4FEE\u6539\u4E86 .ftlh \u9875\u9762\u4EE3\u7801\u5E76\u4FDD\u5B58\uFF0C\u5237\u65B0\u6D4F\u89C8\u5668\u5C31\u80FD\u7ACB\u523B\u770B\u5230\u6548\u679C\uFF0C\u65E0\u9700\u91CD\u542F\u670D\u52A1\u5668\u3002
spring.freemarker.cache=false
spring.freemarker.charset=UTF-8
spring.freemarker.content-type=text/html
spring.freemarker.template-loader-path=classpath:/templates/
# \u544A\u8BC9 FreeMarker\uFF1A\u5728\u6E32\u67D3\u4EFB\u4F55\u9875\u9762\u4E4B\u524D\uFF0C\u5148\u81EA\u52A8\u628A Spring \u7684\u8868\u5355\u7ED1\u5B9A\u5B8F\u5BFC\u5165\u5230 'spring' \u547D\u540D\u7A7A\u95F4\u4E2D
spring.freemarker.settings.auto_import=/spring.ftl as spring

# \u3010\u9632\u767D\u5C4F\u6838\u5FC3\u914D\u7F6E\u3011\uFF1A\u66B4\u9732 Spring \u5B8F\u8F85\u52A9\u529F\u80FD\u3002
# \u5FC5\u987B\u5F00\u542F\u6B64\u9879\uFF0C\u524D\u7AEF\u6A21\u677F\u4E2D\u7684 <@spring.bind "xxx" /> \u624D\u80FD\u6B63\u5E38\u89E3\u6790\u3002\u8FD9\u662F\u5B9E\u73B0\u201C\u8868\u5355\u9519\u8BEF\u7EA2\u5B57\u56DE\u663E\u4E14\u4FDD\u7559\u7528\u6237\u8F93\u5165\u5185\u5BB9\u201D\u7684\u5E95\u5C42\u4F9D\u8D56\u3002
spring.freemarker.expose-spring-macro-helpers=true

# -----------------------------------------
# 5. \u65E5\u5FD7\u6846\u67B6 (SLF4J / Logback) \u7EA7\u522B\u63A7\u5236
# -----------------------------------------
# \u5168\u5C40\u5927\u73AF\u5883\u4FDD\u6301 INFO \u7EA7\u522B\uFF0C\u5C4F\u853D\u6389 Spring, Tomcat \u7B49\u5E95\u5C42\u6846\u67B6\u5E9E\u5927\u7684\u6742\u97F3\u65E5\u5FD7\u3002
logging.level.root=INFO
# \u5C06\u6211\u4EEC\u81EA\u5DF1\u7F16\u5199\u7684\u4E1A\u52A1\u4EE3\u7801\u5305\u964D\u7EA7\u4E3A DEBUG\u3002\u8FD9\u6837\u6211\u4EEC\u5728 Service \u91CC\u5199\u7684 logger.info / logger.debug \u624D\u80FD\u6E05\u6670\u5730\u663E\u73B0\u51FA\u6765\u3002
logging.level.com.example.demo=DEBUG