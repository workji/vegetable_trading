# \u9752\u679C\u4EF2\u5378\u7BA1\u7406\u7CFB\u7EDF - \u5168\u5C40\u56FD\u9645\u5316\u4E0E\u6D88\u606F\u914D\u7F6E\u6587\u4EF6 (messages.properties)
# \u4F5C\u7528\uFF1A\u7EDF\u4E00\u7BA1\u7406\u7CFB\u7EDF\u4E2D\u7684\u6821\u9A8C\u62A5\u9519\u3001\u7C7B\u578B\u8F6C\u6362\u9519\u8BEF\u53CA\u4E1A\u52A1\u63D0\u793A\uFF0C\u6D88\u9664\u786C\u7F16\u7801\u3002
# \u6CE8\u610F\uFF1A\u8BF7\u786E\u4FDD\u60A8\u7684 IDE (\u5982 IntelliJ IDEA) \u5C06 .properties \u6587\u4EF6\u7684\u7F16\u7801\u8BBE\u7F6E\u4E3A UTF-8\u3002
# =================================================================================

# ---------------------------------------------------------------------------------
# 1. Spring MVC \u7C7B\u578B\u7ED1\u5B9A\u5F02\u5E38 (TypeMismatch Errors)
# \u3010\u67B6\u6784\u5E08\u9632\u5751\u6307\u5357\u3011\uFF1A
# \u5F53\u7528\u6237\u5728\u524D\u7AEF\u7684 <input type="number"> \u91CC\u5F3A\u884C\u4F7F\u7528\u5F00\u53D1\u8005\u5DE5\u5177\u6539\u4E3A text \u5E76\u8F93\u5165 "ABC" \u65F6\uFF0C
# \u540E\u7AEF\u7684 BigDecimal \u65E0\u6CD5\u63A5\u6536\uFF0C\u4F1A\u76F4\u63A5\u629B\u51FA TypeMismatchException\u3002
# \u5982\u679C\u4E0D\u5728\u8FD9\u91CC\u914D\u7F6E\uFF0C\u9875\u9762\u4F1A\u663E\u793A\u4E11\u964B\u7684 "Failed to convert property value..." \u82F1\u6587\u957F\u53E5\u3002
# ---------------------------------------------------------------------------------
typeMismatch.java.math.BigDecimal=\u8BF7\u8F93\u5165\u6B63\u786E\u7684\u6570\u503C\u683C\u5F0F\uFF08\u4F8B\uFF1A100.50\uFF09
typeMismatch.java.lang.Integer=\u8BF7\u8F93\u5165\u6B63\u786E\u7684\u6574\u6570\u3002
typeMismatch.java.time.LocalDate=\u8BF7\u8F93\u5165\u6B63\u786E\u7684\u65E5\u671F\u683C\u5F0F\uFF08YYYY-MM-DD\uFF09\u3002
typeMismatch.java.time.LocalDateTime=\u8BF7\u8F93\u5165\u6B63\u786E\u7684\u65E5\u671F\u65F6\u95F4\u683C\u5F0F\u3002

# \u5168\u5C40\u7F3A\u7701\u7684\u7C7B\u578B\u8F6C\u6362\u9519\u8BEF
typeMismatch=\u8F93\u5165\u7684\u6570\u636E\u683C\u5F0F\u4E0D\u6B63\u786E\u3002

# ---------------------------------------------------------------------------------
# 2. Hibernate Validator (JSR-380) \u9ED8\u8BA4\u6821\u9A8C\u6D88\u606F\u5168\u5C40\u8986\u5199
# \u4F5C\u7528\uFF1A\u5982\u679C\u5728 Form \u7C7B\u7684\u6CE8\u89E3\u4E2D\u4E0D\u5199 message="xxx"\uFF0C\u7CFB\u7EDF\u4F1A\u81EA\u52A8\u6765\u8FD9\u91CC\u5BFB\u627E\u5339\u914D\u7684\u63D0\u793A\u8BED\u3002
# ---------------------------------------------------------------------------------
# \u7A7A\u503C\u4E0E\u7A7A\u767D\u6821\u9A8C
NotBlank.message=\u5FC5\u586B\u9879\uFF0C\u4E0D\u53EF\u4EC5\u8F93\u5165\u7A7A\u683C\u3002
NotEmpty.message=\u5FC5\u586B\u9879\u3002
NotNull.message=\u5FC5\u586B\u9879\u3002

# \u6570\u503C\u5927\u5C0F\u6821\u9A8C ({value} \u662F\u52A8\u6001\u5360\u4F4D\u7B26\uFF0C\u4F1A\u81EA\u52A8\u8BFB\u53D6\u6CE8\u89E3\u4E0A\u914D\u7F6E\u7684\u6570\u503C)
Min.message=\u8BF7\u8F93\u5165\u5927\u4E8E\u6216\u7B49\u4E8E {value} \u7684\u6570\u503C\u3002
Max.message=\u8BF7\u8F93\u5165\u5C0F\u4E8E\u6216\u7B49\u4E8E {value} \u7684\u6570\u503C\u3002
DecimalMin.message=\u8BF7\u8F93\u5165\u5927\u4E8E\u6216\u7B49\u4E8E {value} \u7684\u6570\u503C\u3002
DecimalMax.message=\u8BF7\u8F93\u5165\u5C0F\u4E8E\u6216\u7B49\u4E8E {value} \u7684\u6570\u503C\u3002

# \u957F\u5EA6\u4E0E\u683C\u5F0F\u6821\u9A8C
Size.message=\u5B57\u7B26\u957F\u5EA6\u5FC5\u987B\u5728 {min} \u5230 {max} \u4E4B\u95F4\u3002
Pattern.message=\u8BF7\u6309\u7167\u6307\u5B9A\u7684\u683C\u5F0F\u8F93\u5165\u3002
Email.message=\u8BF7\u8F93\u5165\u6B63\u786E\u7684\u90AE\u7BB1\u683C\u5F0F\u3002

